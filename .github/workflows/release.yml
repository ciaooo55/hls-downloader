name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version used in the installer, for example 1.4.0
        required: false
        default: "1.4.0"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-build.txt
            backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install project dependencies
        shell: pwsh
        run: |
          python -m pip install -r requirements-build.txt
          Push-Location frontend
          pnpm install --frozen-lockfile
          Pop-Location
          Push-Location extension
          pnpm install --frozen-lockfile
          Pop-Location

      - name: Run verification
        shell: pwsh
        run: |
          python -m pytest -q
          Push-Location frontend
          pnpm test
          pnpm run build
          Pop-Location
          Push-Location extension
          pnpm test
          pnpm run build
          pnpm exec web-ext lint --source-dir .output/firefox-mv3 --warnings-as-errors
          Pop-Location

      - name: Install packaging tools
        shell: pwsh
        run: choco install ffmpeg nsis -y --no-progress

      - name: Build Windows packages
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          & .\scripts\build_installer.ps1 -Version $version

      - name: Assemble and verify release files
        shell: pwsh
        run: |
          $expected = @(
            "HLSDownloader-Windows-x64-Setup.exe",
            "HLSDownloader-Windows-x64-Portable.zip",
            "HLSDownloader-Chrome.zip",
            "HLSDownloader-Firefox-Unsigned.zip",
            "HLSDownloader-Firefox-Source.zip"
          )
          foreach ($name in $expected) {
            if (-not (Test-Path -LiteralPath (Join-Path .\release $name))) {
              throw "Missing release file: $name"
            }
          }
          $lines = Get-ChildItem .\release -File |
            Where-Object Name -ne "SHA256SUMS.txt" |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            }
          $lines | Set-Content .\release\SHA256SUMS.txt -Encoding ASCII

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: HLSDownloader-Windows-x64
          path: release/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download verified Windows assets
        uses: actions/download-artifact@v7
        with:
          name: HLSDownloader-Windows-x64
          path: release

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $files = @(Get-ChildItem .\release -File | Select-Object -ExpandProperty FullName)
          if ($files.Count -eq 0) {
            throw "No release files were downloaded."
          }
          $notesPath = Join-Path .\docs\releases "${{ github.ref_name }}.md"
          $notesArguments = if (Test-Path -LiteralPath $notesPath) {
            @("--notes-file", $notesPath)
          } else {
            @("--generate-notes")
          }
          & gh release create "${{ github.ref_name }}" @files `
            --repo "${{ github.repository }}" `
            --verify-tag `
            --title "HLS Downloader ${{ github.ref_name }}" `
            @notesArguments
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release creation failed with exit code $LASTEXITCODE"
          }

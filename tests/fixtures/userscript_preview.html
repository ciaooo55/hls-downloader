<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>浏览器脚本预览</title>
  <style>
    body { margin: 0; min-height: 100vh; color: #202831; background: #eef1f4; font: 15px/1.6 "Segoe UI", sans-serif; }
    main { width: min(920px, calc(100% - 48px)); margin: 50px auto; }
    .video { aspect-ratio: 16/9; background: #20252b; border-radius: 8px; }
    h1 { font-size: 24px; }
  </style>
  <script>
    window.GM_addStyle = css => document.head.append(Object.assign(document.createElement('style'), { textContent: css }));
    window.GM_getValue = (key, fallback) => key === 'hls_panel_collapsed' ? location.hash === '#collapsed' : fallback;
    window.GM_setValue = () => {};
    window.GM_setClipboard = () => {};
    window.GM_xmlhttpRequest = options => setTimeout(() => options.onload({
      status: 200,
      responseText: JSON.stringify(options.url.endsWith('/health') ? { status: 'ok', version: '1.1.14' } : { ok: true }),
    }), 20);
    performance.getEntriesByType = type => type === 'resource' ? [
      { name: 'https://cdn.example.test/hls/1080p/index.m3u8?token=preview' },
      { name: 'https://media.example.test/video/master.m3u8' },
    ] : [];
  </script>
</head>
<body>
  <main><div class="video"></div><h1>示例视频页面</h1><p>这个页面用于检查悬浮脚本是否遮挡主要内容。</p></main>
  <script src="../../userscript/m3u8-sniffer.user.js"></script>
</body>
</html>
